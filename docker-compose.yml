version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: shelfscan
      POSTGRES_USER: shelfscan_user
      POSTGRES_PASSWORD: shelfscan_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"  # RabbitMQ management UI

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - rabbitmq

  celery_worker:
    build: .
    command: celery -A celery_app worker --loglevel=info --queues=detection
    volumes:
      - .:/app
      - media_files:/app/media
    env_file:
      - .env
    depends_on:
      - db
      - rabbitmq

  celery_beat:
    build: .
    command: celery -A celery_app beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - rabbitmq

volumes:
  postgres_data:
  media_files:
